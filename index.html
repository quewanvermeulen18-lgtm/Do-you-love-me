<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Am I The Best?</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    /* ── Floating SVG hearts ── */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .heart {
      position: absolute;
      bottom: -60px;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    .heart svg { display: block; }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-10deg); opacity: 0.18; }
      100% { transform: translateY(-110vh) rotate(15deg); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 24px;
      padding: 44px 40px 48px;
      max-width: 460px;
      width: 90%;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px #1e1e1e;
    }

    /* ── Picture frame ── */
    .gallery-frame {
      width: 220px;
      height: 220px;
      margin: 0 auto 28px;
      border-radius: 16px;
      border: 2px solid #333;
      overflow: hidden;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gallery-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Question ── */
    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 1.8rem;
      color: #ffffff;
      margin-bottom: 32px;
      line-height: 1.3;
      letter-spacing: 0.5px;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      line-height: 1;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.95) !important; }

    .btn-yes {
      background: #ffffff;
      color: #000000;
      font-size: 1.1rem;
      padding: 14px 32px;
      box-shadow: 0 4px 20px rgba(255,255,255,0.15);
    }
    .btn-yes:hover {
      box-shadow: 0 8px 30px rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }

    .btn-no {
      background: transparent;
      color: #555;
      font-size: 1rem;
      padding: 12px 26px;
      border: 1px solid #2e2e2e;
    }
    .btn-no:hover { border-color: #444; color: #777; }

    /* ── Hint ── */
    .hint {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #555;
      opacity: 0;
      transition: opacity 0.4s;
      min-height: 18px;
      letter-spacing: 0.3px;
    }
    .hint.show { opacity: 1; }

    /* ══════════════════════════════
       SUCCESS PAGE
    ══════════════════════════════ */
    #success-page {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 40px 24px;
      animation: fadeIn 0.6s ease;
    }
    #success-page.visible { display: flex; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    .success-title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2.2rem, 7vw, 3.8rem);
      color: #ffffff;
      margin-bottom: 14px;
    }

    .success-sub {
      font-size: 1.1rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 44px;
      letter-spacing: 0.5px;
    }

    /* ── Falling hearts on success ── */
    .hearts-success {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      overflow: hidden;
    }
    .heart-fall {
      position: absolute;
      top: -60px;
      animation: heartDrop linear forwards;
    }
    @keyframes heartDrop {
      0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(30deg) scale(0.8); opacity: 0; }
    }

    .btn-reset {
      background: transparent;
      color: #fff;
      font-size: 0.95rem;
      padding: 12px 28px;
      border-radius: 50px;
      border: 1px solid #333;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      transition: border-color 0.2s, color 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-reset:hover { border-color: #666; color: #ccc; }
  </style>
</head>
<body>

<!-- Floating hearts (main page) -->
<div class="hearts-bg" id="hearts-bg"></div>

<!-- Main card -->
<div class="card" id="main-card">

  <div class="gallery-frame">
    <img src="photo.jpg" alt="The best" />
  </div>

  <h1>Do you love me?</h1>

  <div class="btn-row">
    <button class="btn btn-yes" id="btn-yes" onclick="goToSuccess()">YES</button>
    <button class="btn btn-no"  id="btn-no"  onclick="clickNo()">No</button>
  </div>

  <p class="hint" id="hint"></p>
</div>

<!-- Success page -->
<div id="success-page">
  <div class="hearts-success" id="hearts-success"></div>
  <div class="success-title">That's right!</div>
  <div class="success-sub">( don't forget to love me )</div>
  <button class="btn-reset" onclick="resetPage()">Go back</button>
</div>

<script>
  /* ── Floating SVG hearts on main page ── */
  const heartsBg = document.getElementById('hearts-bg');
  function makeSVGHeart(size, color) {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    svg.setAttribute('viewBox', '0 0 32 29.6');
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', 'M16 28.6C16 28.6 1 18.6 1 9.1 1 4.6 4.6 1 9.1 1c2.5 0 4.7 1.1 6.9 3.4C18.2 2.1 20.4 1 22.9 1 27.4 1 31 4.6 31 9.1c0 9.5-15 19.5-15 19.5z');
    path.setAttribute('fill', color);
    svg.appendChild(path);
    return svg;
  }

  for (let i = 0; i < 14; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'heart';
    const size = 14 + Math.random() * 18;
    wrap.appendChild(makeSVGHeart(size, '#ffffff'));
    wrap.style.left = Math.random() * 100 + 'vw';
    wrap.style.animationDuration = (7 + Math.random() * 9) + 's';
    wrap.style.animationDelay = (Math.random() * 10) + 's';
    heartsBg.appendChild(wrap);
  }

  /* ── No button logic ── */
  let noCount = 0;
  const baseFontSize = 1.1;
  const basePadV = 14;
  const basePadH = 32;
  const messages = [
    "Are you sure about that?",
    "Think again...",
    "The YES button is growing for a reason.",
    "You're just being difficult now.",
    "YES is basically a billboard at this point.",
    "Your finger knows where it belongs.",
    "The NO button is running out of time.",
    "Last chance to do the right thing.",
  ];

  function clickNo() {
    noCount++;
    const scale = 1 + noCount * 0.18;
    const yesBtn = document.getElementById('btn-yes');
    yesBtn.style.fontSize = (baseFontSize * scale) + 'rem';
    yesBtn.style.padding = (basePadV * Math.min(scale, 2.2)) + 'px ' + (basePadH * Math.min(scale, 2.5)) + 'px';

    const hint = document.getElementById('hint');
    hint.textContent = messages[Math.min(noCount - 1, messages.length - 1)];
    hint.classList.add('show');

    const noBtn = document.getElementById('btn-no');
    const shrink = Math.max(0.6, 1 - noCount * 0.06);
    noBtn.style.transform = `scale(${shrink})`;
    noBtn.style.opacity = Math.max(0.25, 1 - noCount * 0.09);
  }

  /* ── Success page ── */
  function goToSuccess() {
    document.getElementById('success-page').classList.add('visible');
    spawnFallingHearts();
  }

  function resetPage() {
    document.getElementById('success-page').classList.remove('visible');
    noCount = 0;
    const yesBtn = document.getElementById('btn-yes');
    yesBtn.style.fontSize = baseFontSize + 'rem';
    yesBtn.style.padding = basePadV + 'px ' + basePadH + 'px';
    const noBtn = document.getElementById('btn-no');
    noBtn.style.transform = 'scale(1)';
    noBtn.style.opacity = '1';
    const hint = document.getElementById('hint');
    hint.textContent = '';
    hint.classList.remove('show');
    document.getElementById('hearts-success').innerHTML = '';
  }

  /* ── Falling hearts on success ── */
  function spawnFallingHearts() {
    const area = document.getElementById('hearts-success');
    area.innerHTML = '';
    for (let i = 0; i < 40; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'heart-fall';
      const size = 16 + Math.random() * 28;
      wrap.appendChild(makeSVGHeart(size, '#ffffff'));
      wrap.style.left = Math.random() * 100 + 'vw';
      wrap.style.animationDuration = (2.5 + Math.random() * 3) + 's';
      wrap.style.animationDelay = (Math.random() * 2) + 's';
      area.appendChild(wrap);
    }
  }
</script>
</body>
</html>
